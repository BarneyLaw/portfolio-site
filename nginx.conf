server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Astro generates real HTML files and directories.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;    
    }

    # Cache fingerprinted Astro/Vite build assets aggressively.
    location /_astro/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache HTML for long, so deployments appear quickly.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}